<head>
	<title>SSC swim timeslots</title>
</head>
<body bgcolor=black text=gray>
<h3><b>Datums stunda:(pieejams)</b></h3>
<div id="out"></div>
<script>
const divOut = document.getElementById('out');

function fetchDay(day) {
  // day is YYYY-MM-DD in local time (UTC+3). The API uses UTC bounds.
  const from = new Date(day + "T00:00:00+03:00").toISOString();
  const toD  = new Date(day + "T00:00:00+03:00");
  toD.setUTCDate(toD.getUTCDate() + 1);
  const to = toD.toISOString();

  fetch("https://eu.bookla.com/api/v1/client/companies/042fb9ab-5dd4-4b78-a8ac-d1229322e93d/services/09b3b303-fb77-45d9-bcf2-1434b672f679/times", {
    method: "POST",
    mode: "cors",
    credentials: "omit",
    headers: {
      "accept": "*/*",
      "content-type": "application/json",
      "x-api-key": "gCLUIxLBgnfRK9A6CIGPtJXmqG09COpIEBFm"
    },
    body: JSON.stringify({
      from: from,
      to: to,
      resourceIDs: [],
      tickets: { "c9cd2168-2287-492b-914e-c4b01bd10ebc": 1 }
    })
  })
    .then(response => response.json())
    .then(data => {
      divOut.innerHTML += day;

      // Response may be { times: [...] }, { data: [...] }, or grouped by resource.
      let slots = [];
      if (Array.isArray(data)) slots = data;
      else if (Array.isArray(data.times)) slots = data.times;
      else if (data.times && typeof data.times === 'object') {
        Object.values(data.times).forEach(arr => { if (Array.isArray(arr)) slots = slots.concat(arr); });
      } else if (Array.isArray(data.data)) slots = data.data;

      slots.forEach(ts => {
        const start = ts.startTime || ts.start || ts.time;
        if (!start) return;
        const hour = new Date(start).getUTCHours() + 3;
        let info;
        if (ts.spotsTaken !== undefined && ts.spotsTotal !== undefined)
          info = ts.spotsTaken + "/" + ts.spotsTotal;
        else if (ts.spotsAvailable !== undefined)
          info = ts.spotsAvailable;
        else if (ts.available !== undefined)
          info = ts.available;
        else
          info = "?";
        divOut.innerHTML += "&nbsp;&nbsp;&nbsp;" + hour + ":(" + info + ")";
      });
      divOut.innerHTML += "\n<br>";
    })
    .catch(error => {
      console.error("Request error:", error);
    });
}// EO fetchDay(day)

const today = new Date();
for (let i = 0; i < 3; i++) {
  const d = new Date(today);
  d.setDate(today.getDate() + i);
  const day = d.toISOString().slice(0, 10);
  setTimeout(() => fetchDay(day), i * 1000);
}

</script>

</body>
